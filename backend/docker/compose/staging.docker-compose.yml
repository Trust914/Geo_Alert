version: "3.8"

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────
  postgres:
    container_name: postgres
    build:
      context: ./docker/postgres/
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: geo_alert_db
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geo_alert_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    container_name: geoalert-api
    build:
      context: .                              # ← backend root (where src/, package.json, prisma.config.ts live)
      dockerfile: docker/backend_api/Dockerfile
    ports:
      - "3000:3000"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    # environment:
    #   # Override localhost values with Docker service names
    #   PG_DB_HOST: postgres
    #   PG_DB_PORT: 5432
    #   REDIS_DOCKER_HOST: redis
    #   REDIS_PORT: 6379            # Internal port (not the mapped 6380)
    #   RABBITMQ_DOCKER_HOST: rabbitmq
    #   RABBITMQ_PORT: 5672         # Internal port (not the mapped 5673)
    #   NODE_ENV: production
    volumes:
      # Mount seed data if seeding from outside container
      - ./src/seed/data:/app/src/seed/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  redis:
    container_name: redis
    image: bitnami/redis:latest
    ports:
      - "6380:6379"
    networks:
      - backend
    volumes:
      - redis_data:/bitnami/redis/data
    secrets:
      - redis_password
    entrypoint: ["/bin/sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && exec /opt/bitnami/scripts/redis/entrypoint.sh /opt/bitnami/scripts/redis/run.sh"]
    healthcheck:
      test: ["CMD", "sh", "-c", 'redis-cli -h localhost -p 6379 -a "$(cat /run/secrets/redis_password)" ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    container_name: rabbitmq
    build:
      context: ./docker/rabbitmq/
      dockerfile: Dockerfile
    secrets:
      - rabbitmq_user
      - rabbitmq_password
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - backend
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq.conf

secrets:
  envs:
    file: ./.env

  postgres_password:
    file: ./secrets/postgres_password
  redis_password:
    file: ./secrets/redis_password
  rabbitmq_user:
    file: ./secrets/rabbitmq_user
  rabbitmq_password:
    file: ./secrets/rabbitmq_password

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  backend:
    driver: bridge
    internal: false