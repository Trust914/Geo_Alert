version: "3.8"

# ─────────────────────────────────────────────────────────────
# GeoAlert — Backend Services Compose
#
# The frontend is fully decoupled and has its own compose file:
#   docker/compose/docker-compose.frontend-staging.yml
# For production, build the frontend Docker image separately and
# deploy it independently to your cloud provider.
#
# Directory structure (relative to repo root):
#   backend/               → API source code
#   frontend/              → Frontend source code
#   docker/
#     compose/             → this file lives here
#     backend_api/         → backend Dockerfile
#     postgres/            → postgres Dockerfile
#     rabbitmq/            → rabbitmq Dockerfile
#     frontend/            → frontend Dockerfile, nginx.conf, entrypoint.sh
#
# Profiles:
#   (no profile)  → dev:  redis + rabbitmq only (bare-metal Node)
#   staging       → all backend services, api targets staging Dockerfile stage
#   production    → all backend services, api targets production Dockerfile stage
#   seed          → one-off container to run database seeds
#
# Usage:
#   Dev (infra only):   docker compose -f docker/compose/api-docker-compose.yml up
#   Staging:            docker compose -f docker/compose/api-docker-compose.yml --profile staging up --build -d
#   Production:         docker compose -f docker/compose/api-docker-compose.yml --profile production up -d
#   Run Seeds:          APP_ENV=staging docker compose -f docker/compose/api-docker-compose.yml --profile staging --profile seed run --rm db-seeder
# ─────────────────────────────────────────────────────────────

# ── Shared config ─────────────────────────────────────────────
x-api-secrets: &api-secrets
  secrets:
    - postgres_user
    - postgres_password
    - postgres_db
    - redis_password
    - rabbitmq_user
    - rabbitmq_password
    - jwt_access_token_secret
    - jwt_refresh_token_secret
    - jwt_2fa_token_secret
    - jwt_verify_token_secret
    - two_factor_encryption_key
    - smtp_client_secret
    - smtp_refresh_token
    - smtp_client_id
    - smtp_user
    - at_api_key_dev

x-api-depends: &api-depends
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    db-migrator:
      condition: service_completed_successfully

x-api-healthcheck: &api-healthcheck
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s

x-api-build: &api-build
  context: ../../backend
  dockerfile: ../docker/backend_api/Dockerfile

x-seed-data-volume: &seed-data-volume
  - ../../backend/src/seed/data:/app/src/seed/data

services:
  # ── Redis ────────────────────────────────────────────────────
  redis:
    container_name: geoalert-redis
    image: bitnami/redis:latest
    ports:
      - "6380:6379"
    networks:
      - backend
    volumes:
      - redis_data:/bitnami/redis/data
    secrets:
      - redis_password
    entrypoint:
      - /bin/sh
      - -c
      - |
        export REDIS_PASSWORD=$(cat /run/secrets/redis_password)
        exec /opt/bitnami/scripts/redis/entrypoint.sh /opt/bitnami/scripts/redis/run.sh
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - 'redis-cli -h localhost -p 6379 -a "$(cat /run/secrets/redis_password)" ping'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    container_name: geoalert-rabbitmq
    build:
      context: ../rabbitmq
      dockerfile: Dockerfile
    secrets:
      - rabbitmq_user
      - rabbitmq_password
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - backend
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_CONFIG_FILE: /etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ── Postgres ─────────────────────────────────────────────────
  postgres:
    container_name: geoalert-postgres
    profiles:
      - staging
      - production
    build:
      context: ../postgres
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
      - postgres_user
      - postgres_db
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_DB_FILE: /run/secrets/postgres_db
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/postgres_user) -d $(cat /run/secrets/postgres_db)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── DB Migrator ───────────────────────────────────────────────
  # One-shot container: waits for postgres to be truly ready via
  # pg_isready, then runs prisma migrate deploy. Exits on completion.
  # API services depend on this completing successfully before starting.
  db-migrator:
    container_name: geoalert-db-migrator
    profiles:
      - staging
      - production
    build:
      <<: *api-build
      target: builder
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../backend/envs/.env.${APP_ENV:-staging}
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    restart: no
    command: >
      sh -c "
      echo 'Waiting for postgres to be ready...' &&
      until pg_isready -h postgres -p 5432 -U $(cat /run/secrets/postgres_user); do
        sleep 2;
      done &&
      echo 'Postgres ready — running migrations...' &&
      npm run prisma.deploy
      "

  # ── API — Staging ─────────────────────────────────────────────
  api-staging:
    container_name: geoalert-api-staging
    profiles:
      - staging
    build:
      <<: *api-build
      target: staging
    ports:
      - "3000:3000"
    networks:
      - backend
    <<: [*api-depends, *api-secrets, *api-healthcheck]
    env_file:
      - ../../backend/envs/.env.staging
    volumes: *seed-data-volume
    restart: unless-stopped

  # ── API — Production ──────────────────────────────────────────
  api-production:
    container_name: geoalert-api
    profiles:
      - production
    build:
      <<: *api-build
      target: production
    ports:
      - "3000:3000"
    networks:
      - backend
    <<: [*api-depends, *api-secrets, *api-healthcheck]
    env_file:
      - ../../backend/envs/.env.production
    volumes: *seed-data-volume
    restart: always

  # ── Database Seeder ──────────────────────────────────────────
  db-seeder:
    container_name: geoalert-db-seeder
    profiles:
      - seed
    build:
      <<: *api-build
      target: builder
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    env_file:
      - ../../backend/envs/.env.${APP_ENV:-staging}
    volumes: *seed-data-volume
    <<: *api-secrets
    restart: no
    command: >
      sh -c "
      echo 'Running Population Seeds...' && npm run docker.seed.population &&
      echo 'Running Geo Seeds...' && npm run docker.seed.geo &&
      echo 'Running Admin Seed...' && npm run docker.seed.admin
      "

  nginx:
    image: nginx:1.27-alpine
    container_name: geoalert-nginx
    profiles:
      - production
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    # depends_on:
    #   - api-production
    networks:
      - backend

  certbot:
    image: certbot/certbot
    container_name: geoalert-certbot
    profiles:
      - production
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

# ── Secrets ───────────────────────────────────────────────────
secrets:
  postgres_password:
    file: ../../backend/secrets/postgres_password
  postgres_user:
    file: ../../backend/secrets/postgres_user
  postgres_db:
    file: ../../backend/secrets/postgres_db
  redis_password:
    file: ../../backend/secrets/redis_password
  rabbitmq_user:
    file: ../../backend/secrets/rabbitmq_user
  rabbitmq_password:
    file: ../../backend/secrets/rabbitmq_password
  two_factor_encryption_key:
    file: ../../backend/secrets/two_factor_encryption_key
  jwt_access_token_secret:
    file: ../../backend/secrets/jwt_access_token_secret
  jwt_refresh_token_secret:
    file: ../../backend/secrets/jwt_refresh_token_secret
  jwt_2fa_token_secret:
    file: ../../backend/secrets/jwt_2fa_token_secret
  jwt_verify_token_secret:
    file: ../../backend/secrets/jwt_verify_token_secret
  smtp_user:
    file: ../../backend/secrets/smtp_user
  smtp_client_id:
    file: ../../backend/secrets/smtp_client_id
  smtp_client_secret:
    file: ../../backend/secrets/smtp_client_secret
  smtp_refresh_token:
    file: ../../backend/secrets/smtp_refresh_token
  at_api_key_dev:
    file: ../../backend/secrets/at_api_key_dev

# ── Volumes ───────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

# ── Networks ──────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
