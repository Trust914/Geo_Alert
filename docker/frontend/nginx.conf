server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Staging Proxy: Only works if NGINX_API_HOST is set to your backend container name
    location /api/ {
        # This variable is substituted by entrypoint.sh
        proxy_pass http://${NGINX_API_HOST}:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static Asset Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}