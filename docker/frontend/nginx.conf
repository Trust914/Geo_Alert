# ─────────────────────────────────────────────────────────────
# GeoAlert Frontend — Nginx Config
#
# ${NGINX_PORT}     → substituted by entrypoint.sh
#                     Production: Render's $PORT (default 80)
#                     Staging:    80
#
# ${NGINX_API_HOST} → substituted by entrypoint.sh (staging only)
#                     e.g. geoalert-api-staging
#
# In production the /api/ proxy block is inactive because
# NGINX_API_HOST is not set — the frontend calls
# https://api.geoalert.xyz directly via window.__ENV__.
# ─────────────────────────────────────────────────────────────

server {
    listen ${NGINX_PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching (Vite hashes filenames) ──────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Never cache index.html ────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Never cache runtime env file ─────────────────────────
    location = /__env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API reverse proxy (staging only) ─────────────────────
    # NGINX_API_HOST is substituted at runtime by entrypoint.sh.
    # In production this block is harmless — the frontend never
    # hits /api/ through nginx because VITE_API_BASE_URL points
    # directly to https://api.geoalert.xyz.
    location /api/ {
        proxy_pass http://${NGINX_API_HOST}:3000/api/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}